<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16162a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#f59e0b" flood-opacity="0.15"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="504" height="504" x="4" y="4" rx="92" ry="92" fill="none" stroke="url(#ring)" stroke-width="1.5"/>

  <!-- Glow circle -->
  <circle cx="256" cy="200" r="140" fill="url(#glow)" opacity="0.07"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.5" filter="url(#shadow)"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3"/>

  <!-- Headset icon -->
  <g fill="none" stroke="url(#glow)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#innerGlow)">
    <!-- Headband -->
    <path d="M144 280v-24c0-62 50-112 112-112s112 50 112 112v24"/>
    <!-- Earpieces -->
    <rect x="120" y="272" width="48" height="72" rx="12"/>
    <rect x="344" y="272" width="48" height="72" rx="12"/>
    <!-- Mic -->
    <line x1="280" y1="344" x2="280" y2="380" opacity="0.6"/>
    <rect x="248" y="376" width="64" height="12" rx="6" opacity="0.6"/>
  </g>

  <!-- C letter monogram -->
  <text x="256" y="460" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.9">CRM</text>

  <!-- Subtle shimmer -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#glow)" opacity="0.03"/>
</svg>
